name: ConfigDeck
options:
  bundleIdPrefix: com.configdeck
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "0.1.2"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: YES
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    INFOPLIST_KEY_CFBundleDisplayName: "ConfigDeck"
    INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.developer-tools"
    INFOPLIST_KEY_NSHumanReadableCopyright: "© 2026 sanghun0724 — MIT License"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    DEAD_CODE_STRIPPING: YES
targets:
  ConfigDeck:
    type: application
    platform: macOS
    sources:
      # Exclude tooling state (.omc/) so stray files never ship inside the
      # app bundle as resources.
      - path: Sources
        excludes:
          - ".omc/**"
    settings:
      base:
        PRODUCT_NAME: ConfigDeck
        PRODUCT_BUNDLE_IDENTIFIER: com.configdeck.ConfigDeck
        # Unsandboxed: this tool reads ~/.claude in the user's home directory.
        ENABLE_APP_SANDBOX: NO
  ConfigDeckTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests
    # App-hosted tests: @testable import reaches every internal type (stores,
    # MCPEdit, …) without listing source files here one by one.
    dependencies:
      - target: ConfigDeck
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.configdeck.ConfigDeckTests
        GENERATE_INFOPLIST_FILE: YES
schemes:
  ConfigDeck:
    build:
      targets:
        ConfigDeck: all
        ConfigDeckTests: [test]
    test:
      targets:
        - ConfigDeckTests
    run:
      config: Debug
